<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
    <link
      rel="shortcut icon"
      type="image/png"
      href="../assets/images/vifreud.webp"
    />
    <link rel="stylesheet" type="text/css" href="../css/custom.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <title>AC6 Part Randomizer</title>
  </head>
  <body>
    <div class="container mb-5">
      <!-- HEADER -->
      <div class="row d-flex justify-content-center mt-2">
        <div class="d-flex col-6 justify-content-start px-0">
          <a href="../index.html">
            <button class="btn text-light text-start py-0" type="button">
              <i class="bi bi-arrow-left"></i>
              Back to Challenge
            </button>
          </a>
        </div>
        <div class="d-flex col-6 justify-content-end">
          <a target="_blank" href="https://discord.gg/JFWyQ8q93C">
            <i class="socialIcons bi bi-discord"></i>
          </a>
          <a
            class="mx-2"
            target="_blank"
            href="https://github.com/Selenestica/ac6-roguelike-challenge"
          >
            <i class="socialIcons bi bi-github"></i>
          </a>
          <a target="_blank" href="https://buymeacoffee.com/breakfasttaco">
            <i class="socialIcons bi bi-cup-hot"></i>
          </a>
        </div>
      </div>
      <div class="row d-flex justify-content-center">
        <div class="d-flex col justify-content-center">
          <h1 class="text-light">Armored Core 6</h1>
        </div>
      </div>
      <div class="row d-flex justify-content-center">
        <div class="d-flex col justify-content-center align-items-center">
          <h4
            data-bs-toggle="modal"
            data-bs-target="#rulesModal"
            class="text-light mb-0 mx-2"
          >
            Randomizer
          </h4>
        </div>
      </div>

      <!-- MAIN BODY -->
      <div class="row d-flex justify-content-center pt-2">
        <div class="col-sm-12 col-md-8 col-lg-6">
          <div
            class="row d-flex justify-content-between align-items-center mb-3"
          >
            <div class="col d-flex justify-content-start">
              <button
                class="btn btn-warning"
                type="button"
                onclick="rollParts()"
              >
                Roll <i class="bi bi-arrow-repeat"></i>
              </button>
            </div>
            <div class="col d-flex justify-content-end">
              <button
                class="btn btn-primary"
                type="button"
                data-bs-toggle="modal"
                data-bs-target="#optionsModal"
              >
                <i class="bi bi-gear-fill"></i> Options
              </button>
            </div>
          </div>
          <hr class="text-white" />

          <!-- ROLLED PARTS CONTAINER -->
          <div
            id="rolledPartsContainer"
            class="row d-flex justify-content-center"
          ></div>
        </div>
      </div>
    </div>

    <!-- OPTIONS MODAL -->
    <div class="modal fade" id="optionsModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content bg-grey">
          <div class="modal-header">
            <h5 class="modal-title text-light">Options</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <h5 class="text-white mb-3">Categories</h5>
            <div id="categoryChecklistContainer"></div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Close
            </button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"
    ></script>
    <script src="../js/constants/parts.js"></script>
    <script src="../js/randomizer/main.js"></script>
  </body>
</html>
