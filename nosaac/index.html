<html lang="en">
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" type="text/css" href="../css/custom.css" />
    <link
      rel="shortcut icon"
      type="image/png"
      href="../assets/images/vifreud.webp"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,200;0,300;0,400;0,600;0,700;0,900;1,200;1,300;1,400;1,600;1,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />

    <meta name="description" content="Armored Core 6: Nosaac's Challenge" />
    <title>Armored Core 6: Nosaac's Challenge</title>
  </head>
  <body>
    <div class="container mb-5">
      <!-- HEADER -->
      <div class="row d-flex justify-content-center mt-2">
        <div class="d-flex col-6 justify-content-start px-0">
          <a href="../index.html">
            <button class="btn text-light py-0">
              <i class="bi bi-arrow-left"></i> Back
            </button>
          </a>
        </div>
        <div class="d-flex col-6 justify-content-end align-items-center">
          <span class="text-info fw-bold me-1">COAM:</span>
          <span class="text-white fw-bold" id="coamText">15,000</span>
        </div>
      </div>

      <div class="row d-flex justify-content-center mt-2">
        <div class="d-flex col justify-content-center">
          <h2 class="text-light">AC6 Nosaac Challenge</h2>
        </div>
      </div>

      <!-- MAIN BODY -->
      <div class="row d-flex justify-content-center pt-2">
        <div class="col-sm-12 col-md-10 col-lg-8">
          <!-- VIEW TOGGLE + MISSION BUTTONS -->
          <div
            class="row d-flex justify-content-between align-items-center mb-2"
          >
            <div class="col-auto">
              <div class="btn-group">
                <input
                  type="radio"
                  class="btn-check mainViewButtons"
                  name="viewRadio"
                  id="missionViewButton"
                  autocomplete="off"
                  checked
                />
                <label
                  class="btn btn-outline-primary text-white"
                  for="missionViewButton"
                >
                  <span class="responsiveText">Mission</span>
                  <span class="responsiveIcon"
                    ><i class="bi bi-list-ul"></i
                  ></span>
                </label>
                <input
                  type="radio"
                  class="btn-check mainViewButtons"
                  name="viewRadio"
                  id="inventoryButton"
                  autocomplete="off"
                />
                <label
                  class="btn btn-outline-primary text-white"
                  for="inventoryButton"
                >
                  <span class="responsiveText">Inventory</span>
                  <span class="responsiveIcon"
                    ><i class="bi bi-box-seam"></i
                  ></span>
                </label>
                <input
                  type="radio"
                  class="btn-check mainViewButtons"
                  name="viewRadio"
                  id="shopButton"
                  autocomplete="off"
                />
                <label
                  class="btn btn-outline-primary text-white"
                  for="shopButton"
                >
                  <span class="responsiveText">Shop</span>
                  <span class="responsiveIcon"><i class="bi bi-cart"></i></span>
                </label>
              </div>
            </div>
            <div class="col-auto d-flex gap-2">
              <button
                class="btn btn-success"
                id="missionCompleteButton"
                disabled
                data-bs-toggle="modal"
                data-bs-target="#missionCompleteModal"
              >
                <span class="responsiveText">Mission Complete</span>
                <span class="responsiveIcon"
                  ><i class="bi bi-check-lg"></i
                ></span>
              </button>
              <button
                class="btn btn-danger"
                id="missionFailedButton"
                disabled
                data-bs-toggle="modal"
                data-bs-target="#missionFailedModal"
              >
                <span class="responsiveText">Mission Failed</span>
                <span class="responsiveIcon"
                  ><i class="bi bi-arrow-repeat"></i
                ></span>
              </button>
            </div>
          </div>

          <hr class="text-white" />

          <!-- MISSION VIEW -->
          <div id="missionViewDiv" class="row d-flex justify-content-center">
            <div
              id="missionViewScreen"
              class="d-flex justify-content-center"
            ></div>
          </div>

          <!-- INVENTORY VIEW -->
          <div id="inventoryViewDiv" class="d-none justify-content-center">
            <div id="inventoryContainer"></div>
          </div>

          <!-- SHOP VIEW -->
          <div id="shopViewDiv" class="d-none justify-content-center">
            <div id="shopContainer"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- MISSION COMPLETE MODAL -->
    <div
      class="modal fade"
      id="missionCompleteModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content bg-grey">
          <div class="modal-header">
            <h5 class="modal-title text-light">
              Mission Complete — Select Rank
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <p class="text-white mb-3">What rank did you earn?</p>
            <div class="d-flex flex-column gap-2">
              <button
                class="btn btn-outline-warning"
                data-bs-dismiss="modal"
                onclick="submitMissionReport('S')"
              >
                S Rank — +5,000 COAM
              </button>
              <button
                class="btn btn-outline-primary"
                data-bs-dismiss="modal"
                onclick="submitMissionReport('A')"
              >
                A Rank — +3,500 COAM
              </button>
              <button
                class="btn btn-outline-success"
                data-bs-dismiss="modal"
                onclick="submitMissionReport('B')"
              >
                B Rank — +2,000 COAM
              </button>
              <button
                class="btn btn-outline-secondary"
                data-bs-dismiss="modal"
                onclick="submitMissionReport('C')"
              >
                C Rank — +1,000 COAM
              </button>
              <button
                class="btn btn-outline-danger"
                data-bs-dismiss="modal"
                onclick="submitMissionReport('D')"
              >
                D Rank — +250 COAM
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- MISSION FAILED MODAL -->
    <div
      class="modal fade"
      id="missionFailedModal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content bg-grey">
          <div class="modal-header">
            <h5 class="modal-title text-light">Mission Failed</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body text-white">
            Your equipped parts will be lost. You will retry this mission with
            your remaining inventory and COAM.
          </div>
          <div class="modal-footer d-flex justify-content-between">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button
              type="button"
              class="btn btn-danger"
              data-bs-dismiss="modal"
              onclick="missionFailed()"
            >
              Confirm
            </button>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"
    ></script>
    <script src="../js/constants/starterParts.js"></script>
    <script src="../js/constants/parts.js"></script>
    <script src="../js/constants/missions.js"></script>
    <script src="../js/nosaac/main.js"></script>
  </body>
</html>
